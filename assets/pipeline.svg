<svg xmlns="http://www.w3.org/2000/svg" width="680" height="700" viewBox="0 0 680 700" font-family="Arial, sans-serif">

  <!-- ── Arrow marker ────────────────────────────────────────────────── -->
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#555" stroke-width="1.5"
            stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="ar2" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5"
            stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ══════════════════════════════════════════════════════════════════
       PHASE SIDEBAR BARS
  ══════════════════════════════════════════════════════════════════ -->
  <!-- Data loading bar -->
  <rect x="38" y="40" width="5" height="124" rx="2.5" fill="#B4B2A9"/>
  <!-- Preprocessing bar -->
  <rect x="38" y="184" width="5" height="260" rx="2.5" fill="#5DCAA5"/>
  <!-- Models bar -->
  <rect x="38" y="500" width="5" height="56" rx="2.5" fill="#7F77DD"/>
  <!-- Evaluation bar -->
  <rect x="38" y="612" width="5" height="52" rx="2.5" fill="#378ADD"/>

  <!-- Phase labels -->
  <text x="28" y="80" font-size="9" fill="#888" text-anchor="middle"
        transform="rotate(-90 28 80)">data</text>
  <text x="28" y="314" font-size="9" fill="#0F6E56" text-anchor="middle"
        transform="rotate(-90 28 314)">preprocessing</text>
  <text x="28" y="528" font-size="9" fill="#534AB7" text-anchor="middle"
        transform="rotate(-90 28 528)">models</text>
  <text x="28" y="638" font-size="9" fill="#185FA5" text-anchor="middle"
        transform="rotate(-90 28 638)">eval</text>

  <!-- ══════════════════════════════════════════════════════════════════
       BOX 1 — Dataset
  ══════════════════════════════════════════════════════════════════ -->
  <rect x="150" y="40" width="380" height="52" rx="8"
        fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
  <text x="340" y="60" font-size="14" font-weight="bold" text-anchor="middle"
        fill="#2C2C2A">HAM10000 dataset</text>
  <text x="340" y="78" font-size="12" text-anchor="middle"
        fill="#5F5E5A">10,015 dermoscopic images · 7 diagnostic classes</text>

  <!-- Arrow 1 -->
  <line x1="340" y1="92" x2="340" y2="112"
        stroke="#555" stroke-width="1.2" marker-end="url(#ar)"/>

  <!-- ══════════════════════════════════════════════════════════════════
       BOX 2 — Split
  ══════════════════════════════════════════════════════════════════ -->
  <rect x="150" y="112" width="380" height="52" rx="8"
        fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
  <text x="340" y="132" font-size="14" font-weight="bold" text-anchor="middle"
        fill="#2C2C2A">Lesion-level train / val / test split</text>
  <text x="340" y="150" font-size="12" text-anchor="middle"
        fill="#5F5E5A">70% train · 15% val · 15% test · random_state = 42</text>

  <!-- Side annotation -->
  <line x1="530" y1="138" x2="545" y2="138"
        stroke="#AAAAAA" stroke-width="0.8" stroke-dasharray="3 2"/>
  <text x="549" y="124" font-size="11" fill="#5F5E5A">6,987 train</text>
  <text x="549" y="139" font-size="11" fill="#5F5E5A">1,512 val</text>
  <text x="549" y="154" font-size="11" fill="#5F5E5A">1,516 test</text>

  <!-- Arrow 2 -->
  <line x1="340" y1="164" x2="340" y2="184"
        stroke="#555" stroke-width="1.2" marker-end="url(#ar)"/>

  <!-- ══════════════════════════════════════════════════════════════════
       BOX 3 — Oversampling
  ══════════════════════════════════════════════════════════════════ -->
  <rect x="150" y="184" width="380" height="52" rx="8"
        fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
  <text x="340" y="204" font-size="14" font-weight="bold" text-anchor="middle"
        fill="#085041">Oversampling (train set only)</text>
  <text x="340" y="222" font-size="12" text-anchor="middle"
        fill="#0F6E56">minority classes → 500 each · 8,237 total training samples</text>

  <!-- Arrow 3 -->
  <line x1="340" y1="236" x2="340" y2="256"
        stroke="#555" stroke-width="1.2" marker-end="url(#ar)"/>

  <!-- ══════════════════════════════════════════════════════════════════
       BOX 4 — Class weights
  ══════════════════════════════════════════════════════════════════ -->
  <rect x="150" y="256" width="380" height="52" rx="8"
        fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
  <text x="340" y="276" font-size="14" font-weight="bold" text-anchor="middle"
        fill="#085041">Class weight computation</text>
  <text x="340" y="294" font-size="12" text-anchor="middle"
        fill="#0F6E56">balanced weights on original unbalanced train distribution</text>

  <!-- Arrow 4 -->
  <line x1="340" y1="308" x2="340" y2="328"
        stroke="#555" stroke-width="1.2" marker-end="url(#ar)"/>

  <!-- ══════════════════════════════════════════════════════════════════
       BOX 5 — Augmentation
  ══════════════════════════════════════════════════════════════════ -->
  <rect x="150" y="328" width="380" height="52" rx="8"
        fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
  <text x="340" y="348" font-size="14" font-weight="bold" text-anchor="middle"
        fill="#085041">Augmentation + normalization</text>
  <text x="340" y="366" font-size="12" text-anchor="middle"
        fill="#0F6E56">flip · rotate · jitter · affine · ImageNet norm (train only)</text>

  <!-- Arrow 5 -->
  <line x1="340" y1="380" x2="340" y2="400"
        stroke="#555" stroke-width="1.2" marker-end="url(#ar)"/>

  <!-- ══════════════════════════════════════════════════════════════════
       BOX 6 — DataLoader
  ══════════════════════════════════════════════════════════════════ -->
  <rect x="150" y="400" width="380" height="44" rx="8"
        fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
  <text x="340" y="416" font-size="14" font-weight="bold" text-anchor="middle"
        fill="#085041">DataLoader</text>
  <text x="340" y="432" font-size="12" text-anchor="middle"
        fill="#0F6E56">batch = 32 · train shuffled · val / test fixed order</text>

  <!-- ══════════════════════════════════════════════════════════════════
       FAN ARROWS to three models
  ══════════════════════════════════════════════════════════════════ -->
  <path d="M340,444 V470 H122 V500" fill="none"
        stroke="#555" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="340" y1="444" x2="340" y2="500"
        stroke="#555" stroke-width="1.2" marker-end="url(#ar)"/>
  <path d="M340,444 V470 H558 V500" fill="none"
        stroke="#555" stroke-width="1.2" marker-end="url(#ar)"/>

  <!-- ══════════════════════════════════════════════════════════════════
       MODEL BOXES
  ══════════════════════════════════════════════════════════════════ -->
  <!-- Custom CNN -->
  <rect x="32" y="500" width="180" height="56" rx="8"
        fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
  <text x="122" y="519" font-size="14" font-weight="bold" text-anchor="middle"
        fill="#26215C">Custom CNN</text>
  <text x="122" y="535" font-size="12" text-anchor="middle"
        fill="#534AB7">3-block · from scratch</text>
  <text x="122" y="549" font-size="12" text-anchor="middle"
        fill="#534AB7">lr = 0.001</text>

  <!-- ResNet-50 -->
  <rect x="250" y="500" width="180" height="56" rx="8"
        fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
  <text x="340" y="519" font-size="14" font-weight="bold" text-anchor="middle"
        fill="#26215C">ResNet-50</text>
  <text x="340" y="535" font-size="12" text-anchor="middle"
        fill="#534AB7">ImageNet · layer4 unfrozen</text>
  <text x="340" y="549" font-size="12" text-anchor="middle"
        fill="#534AB7">lr = 0.0001</text>

  <!-- EfficientNet-B3 -->
  <rect x="468" y="500" width="180" height="56" rx="8"
        fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
  <text x="558" y="519" font-size="14" font-weight="bold" text-anchor="middle"
        fill="#26215C">EfficientNet-B3</text>
  <text x="558" y="535" font-size="12" text-anchor="middle"
        fill="#534AB7">ImageNet · last 3 blocks</text>
  <text x="558" y="549" font-size="12" text-anchor="middle"
        fill="#534AB7">lr = 0.0001</text>

  <!-- ══════════════════════════════════════════════════════════════════
       CONVERGENCE ARROWS to evaluation
  ══════════════════════════════════════════════════════════════════ -->
  <path d="M122,556 V584 H340 V612" fill="none"
        stroke="#555" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="340" y1="556" x2="340" y2="612"
        stroke="#555" stroke-width="1.2" marker-end="url(#ar)"/>
  <path d="M558,556 V584 H340 V612" fill="none"
        stroke="#555" stroke-width="1.2" marker-end="url(#ar)"/>

  <!-- ══════════════════════════════════════════════════════════════════
       BOX 7 — Evaluation
  ══════════════════════════════════════════════════════════════════ -->
  <rect x="130" y="612" width="420" height="52" rx="8"
        fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
  <text x="340" y="631" font-size="14" font-weight="bold" text-anchor="middle"
        fill="#042C53">Evaluation on held-out test set (n = 1,516)</text>
  <text x="340" y="649" font-size="12" text-anchor="middle"
        fill="#185FA5">Accuracy · Weighted F1 · Macro F1 · ROC-AUC · confusion matrix</text>

  <!-- ══════════════════════════════════════════════════════════════════
       FIGURE CAPTION
  ══════════════════════════════════════════════════════════════════ -->
  <text x="340" y="688" font-size="11" text-anchor="middle" fill="#888">
    Fig. 1. End-to-end pipeline for HAM10000 skin lesion classification.
  </text>
</svg>
